<script>
function normCDF(x){const a1=.254829592,a2=-.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=.3275911;const sign=x<0?-1:1;x=Math.abs(x)/Math.sqrt(2);const t=1/(1+p*x);const y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);return .5*(1+sign*y)}
function fmtN(v){if(Number.isInteger(v))return v.toString();let s=v.toFixed(4).replace(/0+$/,'').replace(/\.$/,'');return s}
function shuf(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function generateMiniZTable(targetZ){
    const absZ=Math.abs(targetZ);const intP=Math.floor(absZ);const decP=Math.round((absZ-intP)*10);const baseZ=intP+decP/10;const startZ=Math.max(0,baseZ-.2);
    let h=`<table class="z-table"><thead><tr><th>Z</th><th>0.00</th><th>0.01</th><th>0.02</th><th>0.03</th><th>0.04</th><th>0.05</th><th>0.06</th><th>0.07</th><th>0.08</th><th>0.09</th></tr></thead><tbody>`;
    for(let i=0;i<5;i++){const rZ=startZ+i*.1;if(rZ>3.5)break;const rI=Math.floor(rZ);const rD=Math.round((rZ-rI)*10);h+=`<tr><td style="color:var(--accent2);font-weight:700">${rI}.${rD}</td>`;for(let j=0;j<10;j++){const cZ=rZ+j*.01;const p=normCDF(cZ);const hit=Math.round(cZ*100)===Math.round(absZ*100);h+=`<td class="${hit?'z-hit':''}">${p.toFixed(4)}</td>`}h+=`</tr>`}return h+`</tbody></table>`}

function generateMiniTTable(targetNu, targetAlpha){
    const alphas=[0.10, 0.05, 0.025, 0.01, 0.005];
    const tData={10:{0.10:1.372,0.05:1.812,0.025:2.228,0.01:2.764,0.005:3.169},11:{0.10:1.363,0.05:1.796,0.025:2.201,0.01:2.718,0.005:3.106},12:{0.10:1.356,0.05:1.782,0.025:2.179,0.01:2.681,0.005:3.055},13:{0.10:1.350,0.05:1.771,0.025:2.160,0.01:2.650,0.005:3.012},14:{0.10:1.345,0.05:1.761,0.025:2.145,0.01:2.624,0.005:2.977},15:{0.10:1.341,0.05:1.753,0.025:2.131,0.01:2.602,0.005:2.947},16:{0.10:1.337,0.05:1.746,0.025:2.120,0.01:2.583,0.005:2.921},17:{0.10:1.333,0.05:1.740,0.025:2.110,0.01:2.567,0.005:2.898},18:{0.10:1.330,0.05:1.734,0.025:2.101,0.01:2.552,0.005:2.878},19:{0.10:1.328,0.05:1.729,0.025:2.093,0.01:2.539,0.005:2.861},20:{0.10:1.325,0.05:1.725,0.025:2.086,0.01:2.528,0.005:2.845},24:{0.10:1.318,0.05:1.711,0.025:2.064,0.01:2.492,0.005:2.797},25:{0.10:1.316,0.05:1.708,0.025:2.060,0.01:2.485,0.005:2.787},29:{0.10:1.311,0.05:1.699,0.025:2.045,0.01:2.462,0.005:2.756},30:{0.10:1.310,0.05:1.697,0.025:2.042,0.01:2.457,0.005:2.750}};
    let h=`<table class="z-table"><thead><tr><th>ν \\ α</th>${alphas.map(a=>`<th>${a}</th>`).join('')}</tr></thead><tbody>`;
    for(let nu=Math.max(10, targetNu-2); nu<=Math.min(30, targetNu+2); nu++){if(!tData[nu]) continue;h+=`<tr><td style="color:var(--accent2);font-weight:700">${nu}</td>`;alphas.forEach(a => { const val = tData[nu][a]; const hit = nu===targetNu && a===targetAlpha; h+=`<td class="${hit?'z-hit':''}">${val.toFixed(3)}</td>`; });h+=`</tr>`;}
    return h+`</tbody></table>`;
}

function toast(m,t='i'){const c=document.getElementById('toastC'),e=document.createElement('div');e.className=`toast toast-${t}`;e.innerHTML=m;c.appendChild(e);setTimeout(()=>{e.classList.add('toast-out');setTimeout(()=>e.remove(),250)},2200)}
function burst(el){if(!el)return;const r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,c=document.getElementById('partC'),cols=['#38bdf8','#34d399','#7dd3fc','#fbbf24','#93c5fd'];for(let i=0;i<14;i++){const p=document.createElement('div');p.className='particle';const a=(Math.PI*2*i)/14+(Math.random()-.5)*.5,d=35+Math.random()*55;p.style.left=cx+'px';p.style.top=cy+'px';p.style.setProperty('--dx',Math.cos(a)*d+'px');p.style.setProperty('--dy',Math.sin(a)*d+'px');p.style.backgroundColor=cols[i%cols.length];const sz=5+Math.random()*4;p.style.width=sz+'px';p.style.height=sz+'px';c.appendChild(p);setTimeout(()=>p.remove(),700)}}
function bigBurst(){const c=document.getElementById('partC'),cols=['#38bdf8','#34d399','#7dd3fc','#fbbf24','#fff'];for(let i=0;i<35;i++){const p=document.createElement('div');p.className='particle';const a=Math.random()*Math.PI*2,d=80+Math.random()*120;p.style.left=innerWidth/2+'px';p.style.top=innerHeight/2+'px';p.style.setProperty('--dx',Math.cos(a)*d+'px');p.style.setProperty('--dy',Math.sin(a)*d+'px');p.style.backgroundColor=cols[i%cols.length];const sz=4+Math.random()*6;p.style.width=sz+'px';p.style.height=sz+'px';c.appendChild(p);setTimeout(()=>p.remove(),800)}}

function showScr(id){['scrW','scrG','scrR'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==id))}
function buildProg(){const b=document.getElementById('progBar');b.innerHTML='';EX.forEach((_,i)=>{const d=document.createElement('div');d.className='pseg';d.id=`sg${i}`;b.appendChild(d)})}
function updProg(){EX.forEach((_,i)=>{const s=document.getElementById(`sg${i}`);s.className='pseg';if(i<S.idx){const r=S.results[i],ratio=r.score/r.max;s.classList.add(ratio>=.8?'sg':ratio>=.5?'sa':'se')}else if(i===S.idx)s.classList.add('sc')})}
function lockPhase(ph){document.querySelectorAll(`#fb${ph} .fslot`).forEach(s=>{s.classList.remove('filled');s.classList.add('done');s.style.cursor='default'});document.querySelectorAll(`#ch${ph} .chip`).forEach(c=>c.classList.add('used'));document.getElementById(`ca${ph}`).classList.add('hidden');const b=document.getElementById(`hBtn_ph${ph}`);if(b)b.classList.add('used')}

function mkChips(phase, ex){
    let ok=[], dist=[];
    if(phase===1){
        ok.push({id:'v_d1',d:ex.dist});
        if(ex.n) ok.push({id:'v_n1',d:String(ex.n)});
        if(ex.xbar) ok.push({id:'v_x1',d:fmtN(ex.xbar)});
        if(ex.sigma) ok.push({id:'v_s1',d:fmtN(ex.sigma)}); else if(ex.s) ok.push({id:'v_s1',d:fmtN(ex.s)});
        if(ex.type==='sample_size') ok.push({id:'v_e1',d:fmtN(ex.e)});
        dist = ['t','Z','50','1.5','0.05','100'].filter(d => !ok.map(o=>o.d).includes(d)).slice(0,3);
    } else if(phase===2){
        ok.push({id:'v_c2',d:fmtN(ex.conf)});
        ok.push({id:'v_a2',d:fmtN(ex.alpha/2)});
        dist = ['0.90','0.025','1.96','0.01','2.575','1.645'].filter(d => !ok.map(o=>o.d).includes(d)).slice(0,3);
    } else if(phase===3){
        ok.push({id:'v_z3',d:fmtN(ex.crit)});
        dist = [fmtN(ex.crit+0.5), fmtN(ex.crit-0.3), fmtN(1.96), fmtN(1.645)].filter(d => !ok.map(o=>o.d).includes(d)).slice(0,3);
    } else if(phase===4){
        if(ex.type === 'sample_size'){
            ok.push({id:'v_crit4',d:fmtN(ex.crit)});
            ok.push({id:'v_sig4',d:fmtN(ex.sigma)});
            dist = [fmtN(ex.sigma+1), fmtN(ex.crit*ex.sigma+5), '1.5'].slice(0,3);
        } else {
            const num = ex.sigma || ex.s;
            const sqN = Math.sqrt(ex.n);
            ok.push({id:'v_num4',d:fmtN(num)});
            ok.push({id:'v_sq4',d:fmtN(sqN)});
            dist = [fmtN(num+1), fmtN(sqN+1), '0.5'].filter(d => !ok.map(o=>o.d).includes(d)).slice(0,3);
        }
    } else if(phase===5){
        if(ex.type === 'sample_size'){
            ok.push({id:'v_e5',d:fmtN(ex.e)});
            dist = [fmtN(ex.e+1), fmtN(ex.e-0.5), '0.5'].slice(0,3);
        } else {
            ok.push({id:'v_crit5',d:fmtN(ex.crit)});
            ok.push({id:'v_se5',d:fmtN(ex.se)});
            dist = [fmtN(ex.crit+0.5), fmtN(ex.se+0.2), fmtN(ex.margin+1)].filter(d => !ok.map(o=>o.d).includes(d)).slice(0,3);
        }
    } else if(phase===6){
        if(ex.type==='interval'){
            ok.push({id:'v_li6',d:fmtN(ex.lower)});
            ok.push({id:'v_ls6',d:fmtN(ex.upper)});
            dist = [fmtN(ex.lower-1), fmtN(ex.upper+1), fmtN(ex.margin)].slice(0,3);
        } else {
            ok.push({id:'v_n6',d:String(ex.nmin)});
            dist = [String(ex.nmin-10), String(ex.nmin+5), String(Math.round(ex.nmin/2))].slice(0,3);
        }
    }
    return shuf([...ok, ...dist.map((d,i)=>({id:`d${phase}_${i}`,d}))]);
}

            <div class="mb-4 p-3 rounded-lg" style="background:var(--card2);border:1px solid var(--border)"><div id="tableCont"></div></div>
            <div class="formula-board mb-4" id="fb3">
                <span class="ftxt">Valor Crítico = </span><span class="fslot" data-type="v_z3" onclick="onSlot(this)">?</span>
            </div>

        </div>

        </div>

            <div class="phase-badge pb5"><i class="fas fa-arrows-alt-h mr-1.5"></i>Fase 5: Margen de Error (e)</div>
            <div class="formula-board mb-4" id="fb5"></div>
            <div class="flex flex-wrap gap-2 mb-3" id="ch5"></div>

    let fb5html;
    if(isSample) fb5html = `<span class="ftxt">Error máximo admitido e = </span><span class="fslot" data-type="v_e5" onclick="onSlot(this)">?</span>`;
    else fb5html = `<span class="ftxt">Margen de error e = Z<sub>α/2</sub> · SE = </span><span class="fslot" data-type="v_crit5" onclick="onSlot(this)">?</span><span class="ftxt"> · </span><span class="fslot" data-type="v_se5" onclick="onSlot(this)">?</span><span class="ftxt"> = <span class="res-txt">${fmtN(ex.margin)}</span></span>`;

    // Fase 6
    let fb6html;

    else fb6html = `<span class="ftxt">Intervalo: [ x̄ - e , x̄ + e ] = [ </span><span class="fslot" data-type="v_li6" onclick="onSlot(this)">?</span><span class="ftxt"> , </span><span class="fslot" data-type="v_ls6" onclick="onSlot(this)">?</span><span class="ftxt"> ]</span>`;
    document.getElementById('fb6').innerHTML = fb6html;

    loadChipsForPhase(1, ex);
}

function loadChipsForPhase(ph, ex) { const c = mkChips(ph, ex); document.getElementById(`ch${ph}`).innerHTML = c.map(c=>`<div class="chip" data-cid="${c.id}" data-ph="${ph}" onclick="onChip('${c.id}',${ph})">${c.d}</div>`).join(''); }

function onChip(cid,ph){if(S.phase!==ph)return;const el=document.querySelector(`#ch${ph} .chip[data-cid="${cid}"]`);if(!el||el.classList.contains('used'))return;document.querySelectorAll(`#ch${ph} .chip.sel`).forEach(c=>c.classList.remove('sel'));if(S.sel===cid){S.sel=null;return}S.sel=cid;el.classList.add('sel')}

function onSlot(el){
    const type=el.dataset.type;const ph=S.phase;if(el.classList.contains('filled')){rmType(type,ph);return}if(!S.sel){toast('Selecciona una ficha primero','i');return}
    const validIds=['v_d1','v_n1','v_x1','v_s1','v_e1','v_c2','v_a2','v_z3','v_num4','v_sq4','v_crit4','v_sig4','v_crit5','v_se5','v_e5','v_li6','v_ls6','v_n6'];
    if(S.sel===type && validIds.includes(type)) plType(type,ph);
    else{S.errs[type]=(S.errs[type]||0)+1;S.perfect=false;el.classList.add('wf');setTimeout(()=>el.classList.remove('wf'),420);toast('Ese valor no va aquí','e')}
}

function plType(type,ph){const chip=document.querySelector(`#ch${ph} .chip[data-cid="${type}"]`);if(!chip)return;S.placed[type]=type;document.querySelectorAll(`#fb${ph} .fslot[data-type="${type}"]`).forEach(el=>{el.textContent=chip.textContent;el.classList.add('filled')});chip.classList.remove('sel');chip.classList.add('used');S.sel=null;burst(chip);chkFilled(ph)}
function rmType(type,ph){delete S.placed[type];document.querySelectorAll(`#fb${ph} .fslot[data-type="${type}"]`).forEach(el=>{el.textContent='?';el.classList.remove('filled')});const chip=document.querySelector(`#ch${ph} .chip[data-cid="${type}"]`);if(chip)chip.classList.remove('used');chkFilled(ph)}

function chkFilled(ph){
    let req=[];
    if(ph===1){req.push('v_d1'); const ex=EX[S.idx]; if(ex.type==='sample_size'){req.push('v_s1','v_e1')} else {req.push('v_n1','v_x1','v_s1')}}
    else if(ph===2)req=['v_c2','v_a2'];
    else if(ph===3)req=['v_z3'];
    else if(ph===4){ const ex=EX[S.idx]; if(ex.type==='sample_size') req=['v_crit4','v_sig4']; else req=['v_num4','v_sq4']; }
    else if(ph===5){ const ex=EX[S.idx]; if(ex.type==='sample_size') req=['v_e5']; else req=['v_crit5','v_se5']; }
    else if(ph===6){ const ex=EX[S.idx]; if(ex.type==='sample_size') req=['v_n6']; else req=['v_li6','v_ls6']; }
    document.getElementById(`ca${ph}`).classList.toggle('hidden',!req.every(t=>S.placed[t]));
}

function useHint(){
    let ph=S.phase, types=[], labels={v_d1:'Distribución',v_n1:'n',v_x1:'x̄',v_s1:'σ/s',v_e1:'Error e',v_c2:'Confianza',v_a2:'α/2',v_z3:'Valor Crítico',v_num4:'Num',v_sq4:'√n',v_crit4:'Crítico',v_sig4:'Sigma',v_crit5:'Crítico',v_se5:'SE',v_e5:'Margen e',v_li6:'Límite Inf',v_ls6:'Límite Sup',v_n6:'Tamaño n'};
    if(ph===1)types=['v_d1','v_n1','v_x1','v_s1','v_e1']; else if(ph===2)types=['v_c2','v_a2']; else if(ph===3)types=['v_z3']; else if(ph===4)types=['v_num4','v_sq4','v_crit4','v_sig4']; else if(ph===5)types=['v_crit5','v_se5','v_e5']; else if(ph===6)types=['v_li6','v_ls6','v_n6'];
    const empty=types.filter(t=>!S.placed[t]).filter(t=>document.querySelector(`#fb${ph} .fslot[data-type="${t}"]`)); 
    if(!empty.length||S.hintCt>=3)return;
    const pick=empty[Math.floor(Math.random()*empty.length)];S.hints[pick]=true;S.hintCt++;S.perfect=false;
    document.querySelectorAll(`#fb${ph} .fslot[data-type="${pick}"]`).forEach(el=>el.classList.add('hg'));
    if(S.hintCt>=3)document.getElementById(`hBtn_ph${ph}`).classList.add('used');
    toast(`<i class="fas fa-lightbulb mr-1"></i>Busca: <strong>${labels[pick]}</strong> (${S.hintCt}/3)`,'i');
}

function calcP1(){
    const ex=EX[S.idx]; lockPhase(1);
    const bridge=document.getElementById('br1');bridge.classList.remove('hidden');
    let formulaHtml = '';
    if(ex.type === 'sample_size') formulaHtml = `Fórmula Tamaño Muestral: <br> n = ( Z<sub>α/2</sub> · σ / e )<sup>2</sup>`;
    else if(ex.dist === 'Z') formulaHtml = `Fórmula Intervalo Z: <br> x̄ ± Z<sub>α/2</sub> · ( σ / √n )`;
    else formulaHtml = `Fórmula Intervalo t de Student: <br> x̄ ± t<sub>α/2</sub> · ( s / √n )`;
    bridge.innerHTML=`<div class="bridge-div"></div><div class="bridge-res br-pur">Distribución elegida: ${ex.dist}.<br>${formulaHtml}</div><div class="bridge-div"></div>`;burst(bridge.querySelector('.bridge-res'));
    setTimeout(()=>{S.phase=2;document.getElementById('ph2').classList.remove('hidden');loadChipsForPhase(2,ex);document.getElementById('ph2').scrollIntoView({behavior:'smooth',block:'center'})},600);
}

function calcP2(){
    const ex=EX[S.idx]; lockPhase(2);
    const bridge=document.getElementById('br2');bridge.classList.remove('hidden');
    bridge.innerHTML=`<div class="bridge-div"></div><div class="bridge-res br-pink">Confianza ${fmtN(ex.conf)} → Significación α=${fmtN(ex.alpha)} → Buscamos α/2 = ${fmtN(ex.alpha/2)}</div><div class="bridge-div"></div>`;burst(bridge.querySelector('.bridge-res'));
    setTimeout(()=>{
        S.phase=3;document.getElementById('ph3').classList.remove('hidden');loadChipsForPhase(3,ex);
        if(ex.dist === 'Z') document.getElementById('tableCont').innerHTML = generateMiniZTable(ex.crit);
        else document.getElementById('tableCont').innerHTML = generateMiniTTable(ex.nu, ex.alpha/2);
        document.getElementById('ph3').scrollIntoView({behavior:'smooth',block:'center'});
    },600);
}

function calcP3(){
    const ex=EX[S.idx]; lockPhase(3);
    const bridge=document.getElementById('br3');bridge.classList.remove('hidden');
    bridge.innerHTML=`<div class="bridge-div"></div><div class="bridge-res br-pur">Valor crítico encontrado: ${ex.dist}<sub>α/2</sub> = ${fmtN(ex.crit)}</div><div class="bridge-div"></div>`;burst(bridge.querySelector('.bridge-res'));
    setTimeout(()=>{S.phase=4;document.getElementById('ph4').classList.remove('hidden');loadChipsForPhase(4,ex);document.getElementById('ph4').scrollIntoView({behavior:'smooth',block:'center'})},600);
}

function calcP4(){
    const ex=EX[S.idx]; lockPhase(4);
    const bridge=document.getElementById('br4');bridge.classList.remove('hidden');
    if(ex.type==='sample_size') bridge.innerHTML=`<div class="bridge-div"></div><div class="bridge-res br-warn">Numerador calculado: Z · σ = ${fmtN(ex.crit * ex.sigma)}</div><div class="bridge-div"></div>`;
    else bridge.innerHTML=`<div class="bridge-div"></div><div class="bridge-res br-warn">Error Estándar (SE) = ${fmtN(ex.se)}</div><div class="bridge-div"></div>`;
    burst(bridge.querySelector('.bridge-res'));
    setTimeout(()=>{S.phase=5;document.getElementById('ph5').classList.remove('hidden');loadChipsForPhase(5,ex);document.getElementById('ph5').scrollIntoView({behavior:'smooth',block:'center'})},600);
}

function calcP5(){
    const ex=EX[S.idx]; lockPhase(5);
    const bridge=document.getElementById('br5');bridge.classList.remove('hidden');
    if(ex.type==='sample_size') bridge.innerHTML=`<div class="bridge-div"></div><div class="bridge-res br-viol">Error máximo exigido: e = ${fmtN(ex.e)}</div><div class="bridge-div"></div>`;
    else bridge.innerHTML=`<div class="bridge-div"></div><div class="bridge-res br-viol">Margen de error calculado: e = ${fmtN(ex.margin)}</div><div class="bridge-div"></div>`;
    burst(bridge.querySelector('.bridge-res'));
    setTimeout(()=>{S.phase=6;document.getElementById('ph6').classList.remove('hidden');loadChipsForPhase(6,ex);document.getElementById('ph6').scrollIntoView({behavior:'smooth',block:'center'})},600);
}

function calcP6(){
    const ex=EX[S.idx]; lockPhase(6);
    const bridge=document.getElementById('br6');bridge.classList.remove('hidden');
    const last=S.idx>=EX.length-1;
    const nextAction = last ? 'showResults()' : 'nextEx()';
    const nextText = last ? 'ver resultados' : 'siguiente ejercicio';
    
    // Hacemos que el propio banner verde sea clickeable para avanzar
    if(ex.type==='interval') bridge.innerHTML=`<div class="bridge-div"></div><div class="bridge-res br-ok" onclick="${nextAction}">Intervalo de Confianza: [ ${fmtN(ex.lower)} , ${fmtN(ex.upper)} ]<br><span style="font-size:0.8em; opacity:0.8; margin-top:8px; display:inline-block;">Toca aquí para ${nextText} <i class="fas fa-arrow-right"></i></span></div><div class="bridge-div"></div>`;
    else bridge.innerHTML=`<div class="bridge-div"></div><div class="bridge-res br-ok" onclick="${nextAction}">Tamaño muestral mínimo necesario: n = ${ex.nmin}<br><span style="font-size:0.8em; opacity:0.8; margin-top:8px; display:inline-block;">Toca aquí para ${nextText} <i class="fas fa-arrow-right"></i></span></div><div class="bridge-div"></div>`;
    
    burst(bridge.querySelector('.bridge-res'));

    let pts=0;
    ['v_d1','v_n1','v_x1','v_s1','v_e1','v_c2','v_a2','v_z3','v_num4','v_sq4','v_crit4','v_sig4','v_crit5','v_se5','v_e5','v_li6','v_ls6','v_n6'].forEach(t=>{
        if(S.placed[t]){ let b=100; if(S.hints[t])b=25; else if(S.errs[t]>0)b=50; pts+=b; }
    });
    if(S.perfect)pts+=200; S.score+=pts;
    if(S.perfect){S.streak++;if(S.streak>S.maxStreak)S.maxStreak=S.streak}else S.streak=0;
    S.results.push({score:pts,max:1600,perfect:S.perfect,hints:S.hintCt});
    document.getElementById('scN').textContent=S.score;document.getElementById('strN').textContent=S.streak;updProg();
    if(S.perfect){bigBurst();toast(`Perfecto! +${pts} pts (+200 bonus)`,'s')}else toast(`+${pts} pts`,'s');
    
    // También añadimos un botón explícito abajo por si no se dan cuenta de que pueden tocar el banner
    const nxtA=document.getElementById('nxtA');
    nxtA.innerHTML=`<button class="btn-p mt-4" onclick="${nextAction}">${last?'<i class="fas fa-trophy mr-2"></i>Ver resultados finales':'Siguiente ejercicio<i class="fas fa-arrow-right ml-2"></i>'}</button>`;
    nxtA.scrollIntoView({behavior:'smooth',block:'center'});
}

function nextEx(){const c=document.getElementById('gCont');c.style.opacity='0';c.style.transform='translateY(-15px)';c.style.transition='opacity .25s,transform .25s';setTimeout(()=>{loadEx(S.idx+1);c.style.opacity='1';c.style.transform='translateY(0)'},260)}

function showResults(){
    showScr('scrR');const mx=EX.length*1600,te=S.results.reduce((s,r)=>s+r.score,0),pct=mx>0?(te/mx*100):0;const pf=S.results.filter(r=>r.perfect).length;
    let rank,rc;if(pct>=90){rank='Maestro de la Inferencia';rc='rg'}else if(pct>=70){rank='Estadístico Experto';rc='rs'}else if(pct>=50){rank='Analista Iniciado';rc='rb'}else{rank='Novato';rc='rk'}
    document.getElementById('rCont').innerHTML=`
    <div class="mb-1 text-xs font-mono tracking-widest uppercase" style="color:var(--muted)">RESULTADOS FINALES</div>
    <div class="score-big mb-1">${te}</div><div class="text-sm mb-3" style="color:var(--muted)">de ${mx} puntos posibles</div>
    <div class="mb-6"><span class="rank-badge ${rc}">${rank}</span></div>
    <div class="grid grid-cols-3 gap-3 mb-8">
        <div class="text-center p-3 rounded-xl" style="background:var(--card);border:1px solid var(--border)"><div class="text-2xl font-bold font-mono" style="color:var(--success)">${pf}/${EX.length}</div><div class="text-xs mt-1" style="color:var(--muted)">Perfectos</div></div>
        <div class="text-center p-3 rounded-xl" style="background:var(--card);border:1px solid var(--border)"><div class="text-2xl font-bold font-mono" style="color:var(--accent)">${Math.round(pct)}%</div><div class="text-xs mt-1" style="color:var(--muted)">Precisión</div></div>
        <div class="text-center p-3 rounded-xl" style="background:var(--card);border:1px solid var(--border)"><div class="text-2xl font-bold font-mono" style="color:var(--fg)">${S.maxStreak}</div><div class="text-xs mt-1" style="color:var(--muted)">Mejor racha</div></div>
    </div>
    <div class="text-left mb-8"><div class="text-sm font-semibold mb-3" style="color:var(--muted)">Detalle por ejercicio</div><div class="flex flex-col gap-2">${S.results.map((r,i)=>{const ratio=r.score/r.max,bc=ratio>=.8?'var(--success)':ratio>=.5?'var(--accent)':'var(--error)';const short=EX[i].stmt.replace(/<[^>]*>/g,'').substring(0,50)+'...';return`<div class="rcard"><div class="flex items-center justify-between mb-1.5"><div class="flex items-center gap-2"><span class="text-xs font-mono" style="color:var(--muted)">${i+1}.</span><span class="text-xs" style="color:var(--fg)">${short}</span>${r.perfect?'<i class="fas fa-crown" style="color:var(--accent2);font-size:.7rem"></i>':''}</div><span class="text-sm font-mono font-bold" style="color:${bc}">${r.score}/${r.max}</span></div><div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden"><div class="bar-f" style="width:${ratio*100}%;background:${bc}"></div></div></div>`}).join('')}</div></div>
    <div class="flex gap-3 justify-center flex-wrap"><button class="btn-p" onclick="startGame()"><i class="fas fa-redo mr-2"></i>Jugar de nuevo</button><button class="btn-sm" onclick="showScr('scrW')" style="background:var(--card);color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:.65rem 1.8rem;cursor:pointer"><i class="fas fa-home mr-2"></i>Inicio</button></div>`;
    if(pct>=70)bigBurst();
}

function startGame(){S={idx:0,phase:1,score:0,streak:0,maxStreak:0,results:[],sel:null,placed:{},errs:{},hints:{},hintCt:0,perfect:true,v:{}};showScr('scrG');buildProg();loadEx(0)}
document.addEventListener('click',e=>{if(!e.target.closest('.chip')&&!e.target.closest('.fslot')&&S.sel){document.querySelectorAll(`#ch${S.phase} .chip.sel`).forEach(c=>c.classList.remove('sel'));S.sel=null}});
</script>
</body>
</html>
