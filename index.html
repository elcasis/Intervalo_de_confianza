<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Misión: Intervalo de Confianza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Space Grotesk','sans-serif'],mono:['JetBrains Mono','monospace']}}}}</script>
    <style>
        :root{--bg:#080c14;--card:#0f1520;--card2:#161e2e;--border:#1e2d44;--accent:#38bdf8;--accent2:#7dd3fc;--success:#34d399;--error:#f87171;--warn:#fbbf24;--pink:#f472b6;--muted:#7b8ca8;--fg:#e2e8f0;--formula-bg:#0a1018;--formula-border:#1a2538;--slot-empty:#111927;--slot-border:#2a3a52;--chip-bg:#131b2b;--chip-border:#243347}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}
        .screen{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .hidden{display:none!important}
        .bg-blob{position:fixed;border-radius:50%;filter:blur(120px);opacity:.12;pointer-events:none;z-index:0}
        .b1{width:500px;height:500px;background:#38bdf8;top:-150px;left:-100px;animation:bf1 25s ease-in-out infinite}
        .b2{width:400px;height:400px;background:#34d399;bottom:-100px;right:-80px;animation:bf2 20s ease-in-out infinite}
        @keyframes bf1{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,60px)}}
        @keyframes bf2{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,-80px)}}
        .wtitle{font-size:clamp(2rem,7vw,3.5rem);font-weight:700;letter-spacing:-.03em;line-height:1.1;background:linear-gradient(135deg,#38bdf8,#7dd3fc 50%,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .top-bar{position:sticky;top:0;z-index:50;background:rgba(8,12,20,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.6rem 1.2rem;width:100%}
        .pseg{height:5px;flex:1;border-radius:3px;background:var(--border);transition:background .4s,box-shadow .4s;margin:0 2px}
        .pseg.sg{background:var(--success);box-shadow:0 0 6px rgba(52,211,153,.4)}.pseg.sa{background:var(--accent);box-shadow:0 0 6px rgba(56,189,248,.4)}.pseg.se{background:var(--error);box-shadow:0 0 6px rgba(248,113,113,.3)}.pseg.sc{background:var(--accent);animation:sp 1.5s ease-in-out infinite}
        @keyframes sp{0%,100%{opacity:1}50%{opacity:.4}}
        .pcard{background:var(--card);border:1px solid var(--border);border-radius:16px;max-width:740px;width:100%;padding:1.75rem;animation:cin .45s ease-out}
        @keyframes cin{0%{opacity:0;transform:translateY(25px)}100%{opacity:1;transform:translateY(0)}}
        .formula-board{font-family:'JetBrains Mono',monospace;background:var(--formula-bg);border:1px solid var(--formula-border);border-radius:10px;padding:1rem;text-align:center;box-shadow:inset 0 2px 8px rgba(0,0,0,.3);display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:1px;line-height:2.4}
        .ftxt{color:#93c5fd;font-size:1.05rem} .ftxt sup{font-size:.7em;vertical-align:super}
        .fslot{display:inline-flex;align-items:center;justify-content:center;min-width:44px;height:32px;padding:0 8px;background:var(--slot-empty);border:1.5px dashed var(--slot-border);border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:.95rem;color:var(--muted);cursor:pointer;transition:all .2s;vertical-align:middle;margin:0 2px}
        .fslot:hover{border-color:var(--accent);background:rgba(56,189,248,.06)}
        .fslot.filled{border-style:solid;border-color:var(--accent);background:rgba(56,189,248,.12);color:var(--accent2);font-weight:600;cursor:pointer}
        .fslot.filled:hover{border-color:var(--error);background:rgba(248,113,113,.08)}
        .fslot.wf{animation:wfl .4s ease} @keyframes wfl{0%,100%{border-color:var(--slot-border)}30%{border-color:var(--error);background:rgba(248,113,113,.15)}}
        .fslot.hg{border-color:var(--accent2)!important;box-shadow:0 0 10px rgba(125,211,252,.25);animation:hgl 1.5s ease-in-out infinite} @keyframes hgl{0%,100%{box-shadow:0 0 8px rgba(125,211,252,.2)}50%{box-shadow:0 0 16px rgba(125,211,252,.4)}}
        .fslot.done{border-color:var(--success);background:rgba(52,211,153,.1);color:var(--success);cursor:default;border-style:solid} .fslot.done:hover{border-color:var(--success);background:rgba(52,211,153,.1)}
        .chip{display:inline-flex;align-items:center;justify-content:center;padding:.4rem .9rem;background:var(--chip-bg);border:1.5px solid var(--chip-border);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:600;color:var(--fg);cursor:pointer;transition:all .2s;user-select:none}
        .chip:hover:not(.used){border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
        .chip.sel{border-color:var(--accent2);background:rgba(56,189,248,.12);color:var(--accent2);box-shadow:0 0 16px rgba(56,189,248,.2);transform:translateY(-3px)}
        .chip.used{opacity:.25;cursor:default;transform:none;box-shadow:none;border-color:var(--chip-bg)}
        .phase-badge{display:inline-flex;align-items:center;gap:6px;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:.3rem .75rem;border-radius:6px;margin-bottom:.75rem}
        .pb1{color:var(--accent);background:rgba(56,189,248,.07);border:1px solid rgba(56,189,248,.13)}
        .pb2{color:#7dd3fc;background:rgba(125,211,252,.07);border:1px solid rgba(125,211,252,.13)}
        .pb3{color:var(--warn);background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.13)}
        .pb4{color:var(--success);background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.13)}
        .bridge-div{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:1.25rem 0}
        .bridge-res{font-family:'JetBrains Mono',monospace;text-align:center;padding:.6rem 1rem;border-radius:10px;font-size:.85rem;animation:ein .4s ease}
        .br-pur{background:rgba(56,189,248,.05);border:1px solid rgba(56,189,248,.18);color:var(--accent2)}
        .br-ok{background:rgba(52,211,153,.05);border:1px solid rgba(52,211,153,.18);color:var(--success)}
        .btn-p{background:linear-gradient(135deg,#38bdf8,#0284c7);color:#fff;border:none;border-radius:10px;padding:.65rem 1.8rem;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:transform .15s,box-shadow .2s}
        .btn-p:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(56,189,248,.3)}.btn-p:active{transform:translateY(0)}
        .btn-sm{padding:.5rem 1.2rem;font-size:.85rem;border-radius:8px}
        .btn-icon{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.4rem .65rem;cursor:pointer;font-size:.82rem;transition:all .2s}
        .btn-icon:hover:not(.used){border-color:var(--accent);color:var(--accent)}.btn-icon.used{opacity:.3;cursor:default}
        .particle{position:fixed;width:7px;height:7px;border-radius:50%;pointer-events:none;z-index:100;animation:pb .65s ease-out forwards}
        @keyframes pb{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
        .toast-c{position:fixed;top:72px;right:14px;z-index:200;display:flex;flex-direction:column;gap:6px}
        .toast{padding:.55rem .9rem;border-radius:8px;font-size:.82rem;font-weight:500;animation:tin .25s ease;box-shadow:0 4px 16px rgba(0,0,0,.4)}
        .toast-s{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.25);color:var(--success)}.toast-e{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.25);color:var(--error)}.toast-i{background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.25);color:var(--accent)}.toast-out{animation:tout .25s ease forwards}
        @keyframes tin{0%{opacity:0;transform:translateX(30px)}100%{opacity:1;transform:translateX(0)}} @keyframes tout{0%{opacity:1;transform:translateX(0)}100%{opacity:0;transform:translateX(30px)}} @keyframes ein{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
        .score-big{font-size:clamp(2.5rem,9vw,4.5rem);font-weight:700;line-height:1;background:linear-gradient(135deg,#38bdf8,#7dd3fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        @media(max-width:640px){.pcard{padding:1.2rem;margin:0 .3rem}.formula-board{font-size:.82rem;padding:.7rem .5rem;line-height:2.2}.fslot{min-width:36px;height:28px;font-size:.8rem;padding:0 5px}.chip{padding:.35rem .65rem;font-size:.88rem}}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>
<div class="bg-blob b1"></div><div class="bg-blob b2"></div><div class="toast-c" id="toastC"></div><div id="partC"></div>

<div class="screen" id="scrW">
    <div class="text-center px-4 max-w-2xl">
        <div class="mb-2 text-sm font-mono tracking-widest uppercase" style="color:var(--muted)">Tema 8: Inferencia Estadística</div>
        <h1 class="wtitle mb-3">Misión: Intervalo de Confianza</h1>
        <p class="mb-6 mx-auto" style="color:var(--muted);max-width:520px;font-size:.93rem">Aprende a decidir entre Normal Z y Student t, calcula márgenes de error y determina tamaños muestrales. Basado en tus ejercicios del Tema 8.</p>
        <button class="btn-p" onclick="startGame()"><i class="fas fa-play mr-2"></i>Comenzar Misión</button>
    </div>
</div>

<div class="screen hidden" id="scrG" style="justify-content:flex-start">
    <div class="top-bar">
        <div class="flex items-center justify-between mb-2">
            <span class="font-mono text-sm" style="color:var(--muted)" id="pCtr">1 / 8</span>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-1.5" style="color:var(--accent);font-size:.82rem"><i class="fas fa-fire"></i><span class="font-mono font-bold" id="strN">0</span></div>
                <div class="flex items-center gap-1.5"><i class="fas fa-star" style="color:var(--accent);font-size:.82rem"></i><span class="font-mono font-bold" style="color:var(--accent2)" id="scN">0</span></div>
            </div>
        </div>
        <div class="flex" id="progBar"></div>
    </div>
    <div class="flex-1 flex items-start justify-center pt-5 pb-12 px-3"><div id="gCont" class="w-full" style="max-width:740px"></div></div>
</div>

<div class="screen hidden" id="scrR"><div class="text-center px-4 max-w-xl w-full" id="rCont"></div></div>

<script>
function fmtN(v){if(Number.isInteger(v))return v.toString();let s=v.toFixed(4).replace(/0+$/,'').replace(/\.$/,'');return s}
function shuf(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

// Ejercicios basados directamente en el Cuaderno del Tema 8 y sus variaciones
const EX=[
{type:'interval', stmt:'El peso medio de una muestra de <strong>100</strong> cachorros de San Bernardo es de <strong>3.2 kg</strong>. Sabiendo que la desviación típica poblacional es <strong>150 g (0.15 kg)</strong>, obtén el intervalo de confianza con significación <strong>α=0.05</strong>.', n:100, xbar:3.2, sigma:0.15, s:null, conf:0.95, alpha:0.05, dist:'Z', crit:1.96, se:0.015, margin:0.0294, lower:3.1706, upper:3.2294},
{type:'interval', stmt:'Para una muestra de <strong>30</strong> trabajadores, el retraso sigue una media de <strong>5.83 min</strong> y desviación típica poblacional de <strong>1.92 min</strong>. Determine el intervalo de confianza al <strong>80%</strong>.', n:30, xbar:5.83, sigma:1.92, s:null, conf:0.80, alpha:0.20, dist:'Z', crit:1.282, se:0.3509, margin:0.4498, lower:5.3802, upper:6.2798},
{type:'sample_size', stmt:'Se desea estimar el peso medio de sandías. Desviación típica <strong>σ=400 g</strong>. Error máximo <strong>e=50 g</strong>. Nivel de confianza <strong>95%</strong>. ¿Tamaño mínimo de la muestra?', n:null, xbar:null, sigma:400, s:null, e:50, conf:0.95, alpha:0.05, dist:'Z', crit:1.96, nmin:246},
{type:'sample_size', stmt:'Altura de mástiles: desviación <strong>σ=8 cm</strong>. Error menor que <strong>1 cm</strong>. Significación <strong>10%</strong>. ¿Tamaño mínimo de la muestra?', n:null, xbar:null, sigma:8, s:null, e:1, conf:0.90, alpha:0.10, dist:'Z', crit:1.645, nmin:174},
{type:'interval', stmt:'Se mide el tiempo de concentración de <strong>20</strong> pacientes. Media <strong>42 min</strong>, cuasivarianza <strong>25 min²</strong> (s=5). Intervalo de confianza al <strong>95%</strong>.', n:20, xbar:42, sigma:null, s:5, conf:0.95, alpha:0.05, dist:'t', nu:19, crit:2.093, se:1.1180, margin:2.3399, lower:39.6601, upper:44.3399},
{type:'interval', stmt:'Muestras de sangre: <strong>81</strong> extracciones. Media <strong>10.5 g/dL</strong>. Desviación poblacional <strong>1.2 g/dL</strong>. Intervalo de confianza al <strong>99%</strong>.', n:81, xbar:10.5, sigma:1.2, s:null, conf:0.99, alpha:0.01, dist:'Z', crit:2.575, se:0.1333, margin:0.3433, lower:10.1567, upper:10.8433},
{type:'interval', stmt:'Horas de sueño en <strong>25</strong> estudiantes: media <strong>7.2 h</strong>, desviación muestral <strong>1.5 h</strong>. Intervalo de confianza al <strong>99%</strong>.', n:25, xbar:7.2, sigma:null, s:1.5, conf:0.99, alpha:0.01, dist:'t', nu:24, crit:2.797, se:0.3000, margin:0.8391, lower:6.3609, upper:8.0391},
{type:'interval', stmt:'Vida útil de <strong>50</strong> bombillas: media <strong>1200 h</strong>, desviación típica poblacional <strong>100 h</strong>. Intervalo de confianza al <strong>90%</strong>.', n:50, xbar:1200, sigma:100, s:null, conf:0.90, alpha:0.10, dist:'Z', crit:1.645, se:14.1421, margin:23.2638, lower:1176.7362, upper:1223.2638}
];

let S={idx:0,phase:1,score:0,streak:0,maxStreak:0,results:[],sel:null,placed:{},errs:{},hints:{},hintCt:0,perfect:true,v:{}};

function toast(m,t='i'){const c=document.getElementById('toastC'),e=document.createElement('div');e.className=`toast toast-${t}`;e.innerHTML=m;c.appendChild(e);setTimeout(()=>{e.classList.add('toast-out');setTimeout(()=>e.remove(),250)},2200)}
function burst(el){if(!el)return;const r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,c=document.getElementById('partC'),cols=['#38bdf8','#34d399','#7dd3fc','#fbbf24','#93c5fd'];for(let i=0;i<14;i++){const p=document.createElement('div');p.className='particle';const a=(Math.PI*2*i)/14+(Math.random()-.5)*.5,d=35+Math.random()*55;p.style.left=cx+'px';p.style.top=cy+'px';p.style.setProperty('--dx',Math.cos(a)*d+'px');p.style.setProperty('--dy',Math.sin(a)*d+'px');p.style.backgroundColor=cols[i%cols.length];const sz=5+Math.random()*4;p.style.width=sz+'px';p.style.height=sz+'px';c.appendChild(p);setTimeout(()=>p.remove(),700)}}
function bigBurst(){const c=document.getElementById('partC'),cols=['#38bdf8','#34d399','#7dd3fc','#fbbf24','#fff'];for(let i=0;i<35;i++){const p=document.createElement('div');p.className='particle';const a=Math.random()*Math.PI*2,d=80+Math.random()*120;p.style.left=innerWidth/2+'px';p.style.top=innerHeight/2+'px';p.style.setProperty('--dx',Math.cos(a)*d+'px');p.style.setProperty('--dy',Math.sin(a)*d+'px');p.style.backgroundColor=cols[i%cols.length];const sz=4+Math.random()*6;p.style.width=sz+'px';p.style.height=sz+'px';c.appendChild(p);setTimeout(()=>p.remove(),800)}}

function showScr(id){['scrW','scrG','scrR'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==id))}
function buildProg(){const b=document.getElementById('progBar');b.innerHTML='';EX.forEach((_,i)=>{const d=document.createElement('div');d.className='pseg';d.id=`sg${i}`;b.appendChild(d)})}
function updProg(){EX.forEach((_,i)=>{const s=document.getElementById(`sg${i}`);s.className='pseg';if(i<S.idx){const r=S.results[i],ratio=r.score/r.max;s.classList.add(ratio>=.8?'sg':ratio>=.5?'sa':'se')}else if(i===S.idx)s.classList.add('sc')})}
function lockPhase(ph){document.querySelectorAll(`#fb${ph} .fslot`).forEach(s=>{s.classList.remove('filled');s.classList.add('done');s.style.cursor='default'});document.querySelectorAll(`#ch${ph} .chip`).forEach(c=>c.classList.add('used'));document.getElementById(`ca${ph}`).classList.add('hidden');const b=document.getElementById(`hBtn_ph${ph}`);if(b)b.classList.add('used')}

function mkChips(phase, ex){
    let ok=[], dist=[];
    if(phase===1){
        ok.push({id:'v_d1',d:ex.dist});
        if(ex.n) ok.push({id:'v_n1',d:String(ex.n)});
        if(ex.xbar) ok.push({id:'v_x1',d:fmtN(ex.xbar)});
        if(ex.sigma) ok.push({id:'v_s1',d:fmtN(ex.sigma)}); else if(ex.s) ok.push({id:'v_s1',d:fmtN(ex.s)});
        if(ex.type==='sample_size') ok.push({id:'v_e1',d:fmtN(ex.e)});
        // Distractores
        dist = ['t','Z','50','1.5','0.05','100'].filter(d => !ok.map(o=>o.d).includes(d)).slice(0,3);
    } else if(phase===2){
        ok.push({id:'v_c2',d:fmtN(ex.conf)});
        ok.push({id:'v_a2',d:fmtN(ex.alpha/2)});
        ok.push({id:'v_z2',d:fmtN(ex.crit)});
        dist = ['0.90','0.025','1.96','0.01','2.575','1.645'].filter(d => !ok.map(o=>o.d).includes(d)).slice(0,3);
    } else if(phase===3){
        const num = ex.sigma || ex.s;
        const sqN = Math.sqrt(ex.n || (ex.nmin || 10));
        const se = ex.se || (num / sqN);
        ok.push({id:'v_num3',d:fmtN(num)});
        if(ex.n) ok.push({id:'v_sq3',d:fmtN(sqN)});
        ok.push({id:'v_se3',d:fmtN(se)});
        dist = [fmtN(num+1), fmtN(sqN+1), fmtN(se+0.5), '0.5'].filter(d => !ok.map(o=>o.d).includes(d)).slice(0,3);
    } else if(phase===4){
        if(ex.type==='interval'){
            ok.push({id:'v_e4',d:fmtN(ex.margin)});
            ok.push({id:'v_li4',d:fmtN(ex.lower)});
            ok.push({id:'v_ls4',d:fmtN(ex.upper)});
            dist = [fmtN(ex.lower-1), fmtN(ex.upper+1), fmtN(ex.margin+1)].slice(0,3);
        } else {
            ok.push({id:'v_n4',d:String(ex.nmin)});
            dist = [String(ex.nmin-10), String(ex.nmin+5), String(Math.round(ex.nmin/2))].slice(0,3);
        }
    }
    return shuf([...ok, ...dist.map((d,i)=>({id:`d${phase}_${i}`,d}))]);
}

function loadEx(idx){
    const ex=EX[idx];
    S.idx=idx;S.phase=1;S.sel=null;S.placed={};S.errs={};S.hints={};S.hintCt=0;S.perfect=true;
    document.getElementById('pCtr').textContent=`${idx+1} / ${EX.length}`;
    document.getElementById('scN').textContent=S.score;
    document.getElementById('strN').textContent=S.streak;
    updProg();

    const isSample = ex.type === 'sample_size';
    const symbol = ex.sigma ? 'σ' : 's';

    document.getElementById('gCont').innerHTML=`
    <div class="pcard">
        <p class="text-base mb-5 leading-relaxed" style="font-weight:500">${ex.stmt}</p>
        
        <div id="ph1">
            <div class="phase-badge pb1"><i class="fas fa-search mr-1.5"></i>Fase 1: Parámetros y Distribución</div>
            <div class="formula-board mb-4" id="fb1"></div>
            <div class="flex flex-wrap gap-2 mb-3" id="ch1"></div>
            <div class="flex gap-2 mb-3"><button class="btn-icon" id="hBtn_ph1" onclick="useHint()"><i class="fas fa-lightbulb"></i></button></div>
            <div id="ca1" class="hidden"><button class="btn-p btn-sm w-full" onclick="calcP1()"><i class="fas fa-check mr-1.5"></i>Confirmar Parámetros</button></div>
        </div>
        <div id="br1" class="hidden"></div>

        <div id="ph2" class="hidden">
            <div class="phase-badge pb2"><i class="fas fa-table mr-1.5"></i>Fase 2: Nivel de Confianza y Valor Crítico</div>
            <div class="formula-board mb-4" id="fb2">
                <span class="ftxt">Confianza (1-α) = </span><span class="fslot" data-type="v_c2" onclick="onSlot(this)">?</span>
                <span class="ftxt" style="margin-left:8px">α/2 = </span><span class="fslot" data-type="v_a2" onclick="onSlot(this)">?</span>
                <span class="ftxt" style="margin-left:8px">Crítico = </span><span class="fslot" data-type="v_z2" onclick="onSlot(this)">?</span>
            </div>
            <div class="flex flex-wrap gap-2 mb-3" id="ch2"></div>
            <div class="flex gap-2 mb-3"><button class="btn-icon" id="hBtn_ph2" onclick="useHint()"><i class="fas fa-lightbulb"></i></button></div>
            <div id="ca2" class="hidden"><button class="btn-p btn-sm w-full" onclick="calcP2()"><i class="fas fa-check mr-1.5"></i>Confirmar Valor Crítico</button></div>
        </div>
        <div id="br2" class="hidden"></div>

        <div id="ph3" class="hidden">
            <div class="phase-badge pb3"><i class="fas fa-calculator mr-1.5"></i>Fase 3: Error Estándar (SE)</div>
            <div class="formula-board mb-4" id="fb3"></div>
            <div class="flex flex-wrap gap-2 mb-3" id="ch3"></div>
            <div class="flex gap-2 mb-3"><button class="btn-icon" id="hBtn_ph3" onclick="useHint()"><i class="fas fa-lightbulb"></i></button></div>
            <div id="ca3" class="hidden"><button class="btn-p btn-sm w-full" onclick="calcP3()"><i class="fas fa-check mr-1.5"></i>Confirmar SE</button></div>
        </div>
        <div id="br3" class="hidden"></div>

        <div id="ph4" class="hidden">
            <div class="phase-badge pb4"><i class="fas fa-flag-checkered mr-1.5"></i>Fase 4: Resultado Final</div>
            <div class="formula-board mb-4" id="fb4"></div>
            <div class="flex flex-wrap gap-2 mb-3" id="ch4"></div>
            <div class="flex gap-2 mb-3"><button class="btn-icon" id="hBtn_ph4" onclick="useHint()"><i class="fas fa-lightbulb"></i></button></div>
            <div id="ca4" class="hidden"><button class="btn-p btn-sm w-full" onclick="calcP4()"><i class="fas fa-check mr-1.5"></i>Finalizar</button></div>
        </div>
        <div id="nxtA"></div>
    </div>`;
    
    // Fase 1 Dinámica
    let fb1html = `<span class="ftxt">Distribución: </span><span class="fslot" data-type="v_d1" onclick="onSlot(this)">?</span>`;
    if(isSample){
        fb1html += `<span class="ftxt" style="margin-left:8px">σ = </span><span class="fslot" data-type="v_s1" onclick="onSlot(this)">?</span><span class="ftxt" style="margin-left:8px">Error máx (e) = </span><span class="fslot" data-type="v_e1" onclick="onSlot(this)">?</span>`;
    } else {
        fb1html += `<span class="ftxt" style="margin-left:8px">n = </span><span class="fslot" data-type="v_n1" onclick="onSlot(this)">?</span>`;
        fb1html += `<span class="ftxt" style="margin-left:8px">x̄ = </span><span class="fslot" data-type="v_x1" onclick="onSlot(this)">?</span>`;
        fb1html += `<span class="ftxt" style="margin-left:8px">${symbol} = </span><span class="fslot" data-type="v_s1" onclick="onSlot(this)">?</span>`;
    }
    document.getElementById('fb1').innerHTML = fb1html;

    // Fase 3 Dinámica
    let fb3html;
    if(isSample) {
        fb3html = `<span class="ftxt">Para n, usaremos la fórmula directa.</span>`; // Placeholder visual
    } else {
        const sqN = Math.sqrt(ex.n);
        fb3html = `<span class="ftxt">SE = ${symbol}/√n = </span><span class="fslot" data-type="v_num3" onclick="onSlot(this)">?</span><span class="ftxt"> / </span><span class="fslot" data-type="v_sq3" onclick="onSlot(this)">?</span><span class="ftxt"> = </span><span class="fslot" data-type="v_se3" onclick="onSlot(this)">?</span>`;
    }
    document.getElementById('fb3').innerHTML = fb3html;

    // Fase 4 Dinámica
    let fb4html;
    if(isSample){
        fb4html = `<span class="ftxt">Tamaño muestral n = </span><span class="fslot" data-type="v_n4" onclick="onSlot(this)">?</span>`;
    } else {
        fb4html = `<span class="ftxt">Error (e) = </span><span class="fslot" data-type="v_e4" onclick="onSlot(this)">?</span>`;
        fb4html += `<span class="ftxt" style="margin-left:10px">Intervalo: [ </span><span class="fslot" data-type="v_li4" onclick="onSlot(this)">?</span><span class="ftxt"> , </span><span class="fslot" data-type="v_ls4" onclick="onSlot(this)">?</span><span class="ftxt"> ]</span>`;
    }
    document.getElementById('fb4').innerHTML = fb4html;

    loadChipsForPhase(1, ex);
}

function loadChipsForPhase(ph, ex) {
    const c = mkChips(ph, ex);
    document.getElementById(`ch${ph}`).innerHTML = c.map(c=>`<div class="chip" data-cid="${c.id}" data-ph="${ph}" onclick="onChip('${c.id}',${ph})">${c.d}</div>`).join('');
}

function onChip(cid,ph){if(S.phase!==ph)return;const el=document.querySelector(`#ch${ph} .chip[data-cid="${cid}"]`);if(!el||el.classList.contains('used'))return;document.querySelectorAll(`#ch${ph} .chip.sel`).forEach(c=>c.classList.remove('sel'));if(S.sel===cid){S.sel=null;return}S.sel=cid;el.classList.add('sel')}

function onSlot(el){
    const type=el.dataset.type;const ph=S.phase;if(el.classList.contains('filled')){rmType(type,ph);return}if(!S.sel){toast('Selecciona una ficha primero','i');return}
    const validIds=['v_d1','v_n1','v_x1','v_s1','v_e1','v_c2','v_a2','v_z2','v_num3','v_sq3','v_se3','v_e4','v_li4','v_ls4','v_n4'];
    if(S.sel===type && validIds.includes(type)) plType(type,ph);
    else{S.errs[type]=(S.errs[type]||0)+1;S.perfect=false;el.classList.add('wf');setTimeout(()=>el.classList.remove('wf'),420);toast('Ese valor no va aquí','e')}
}

function plType(type,ph){const chip=document.querySelector(`#ch${ph} .chip[data-cid="${type}"]`);if(!chip)return;S.placed[type]=type;document.querySelectorAll(`#fb${ph} .fslot[data-type="${type}"]`).forEach(el=>{el.textContent=chip.textContent;el.classList.add('filled')});chip.classList.remove('sel');chip.classList.add('used');S.sel=null;burst(chip);chkFilled(ph)}
function rmType(type,ph){delete S.placed[type];document.querySelectorAll(`#fb${ph} .fslot[data-type="${type}"]`).forEach(el=>{el.textContent='?';el.classList.remove('filled')});const chip=document.querySelector(`#ch${ph} .chip[data-cid="${type}"]`);if(chip)chip.classList.remove('used');chkFilled(ph)}

function chkFilled(ph){
    let req=[];
    if(ph===1){req.push('v_d1'); const ex=EX[S.idx]; if(ex.type==='sample_size'){req.push('v_s1','v_e1')} else {req.push('v_n1','v_x1','v_s1')}}
    else if(ph===2)req=['v_c2','v_a2','v_z2'];
    else if(ph===3){ const ex=EX[S.idx]; if(ex.type==='sample_size') req=['v_num3']; else req=['v_num3','v_sq3','v_se3']; }
    else if(ph===4){ const ex=EX[S.idx]; if(ex.type==='sample_size') req=['v_n4']; else req=['v_e4','v_li4','v_ls4']; }
    document.getElementById(`ca${ph}`).classList.toggle('hidden',!req.every(t=>S.placed[t]));
}

function useHint(){
    let ph=S.phase, types=[], labels={v_d1:'Distribución',v_n1:'n',v_x1:'x̄',v_s1:'σ/s',v_e1:'Error e',v_c2:'Confianza',v_a2:'α/2',v_z2:'Crítico',v_num3:'Numerador',v_sq3:'√n',v_se3:'SE',v_e4:'Error Margen',v_li4:'Límite Inf',v_ls4:'Límite Sup',v_n4:'Tamaño n'};
    if(ph===1)types=['v_d1','v_n1','v_x1','v_s1','v_e1']; else if(ph===2)types=['v_c2','v_a2','v_z2']; else if(ph===3)types=['v_num3','v_sq3','v_se3']; else if(ph===4)types=['v_e4','v_li4','v_ls4','v_n4'];
    const empty=types.filter(t=>!S.placed[t]).filter(t=>document.querySelector(`#fb${ph} .fslot[data-type="${t}"]`)); // Only hint visible slots
    if(!empty.length||S.hintCt>=3)return;
    const pick=empty[Math.floor(Math.random()*empty.length)];S.hints[pick]=true;S.hintCt++;S.perfect=false;
    document.querySelectorAll(`#fb${ph} .fslot[data-type="${pick}"]`).forEach(el=>el.classList.add('hg'));
    if(S.hintCt>=3)document.getElementById(`hBtn_ph${ph}`).classList.add('used');
    toast(`<i class="fas fa-lightbulb mr-1"></i>Busca: <strong>${labels[pick]}</strong> (${S.hintCt}/3)`,'i');
}

function calcP1(){
    const ex=EX[S.idx]; lockPhase(1);
    const bridge=document.getElementById('br1');bridge.classList.remove('hidden');
    const msg = ex.dist === 'Z' ? `Muestra grande (n≥30) o σ conocida: Usaremos la Normal Z` : `Muestra pequeña (n<30) y σ desconocida: Usaremos la t de Student`;
    bridge.innerHTML=`<div class="bridge-div"></div><div class="bridge-res br-pur">Distribución elegida: ${ex.dist}. ${msg}</div><div class="bridge-div"></div>`;burst(bridge.querySelector('.bridge-res'));
    setTimeout(()=>{S.phase=2;document.getElementById('ph2').classList.remove('hidden');loadChipsForPhase(2,ex);document.getElementById('ph2').scrollIntoView({behavior:'smooth',block:'center'})},600);
}

function calcP2(){
    const ex=EX[S.idx]; lockPhase(2);
    const bridge=document.getElementById('br2');bridge.classList.remove('hidden');
    bridge.innerHTML=`<div class="bridge-div"></div><div class="bridge-res br-pur">Nivel de Confianza ${fmtN(ex.conf)} → Significación α=${fmtN(ex.alpha)} → α/2=${fmtN(ex.alpha/2)} → Valor Crítico=${fmtN(ex.crit)}</div><div class="bridge-div"></div>`;burst(bridge.querySelector('.bridge-res'));
    setTimeout(()=>{S.phase=3;document.getElementById('ph3').classList.remove('hidden');loadChipsForPhase(3,ex);document.getElementById('ph3').scrollIntoView({behavior:'smooth',block:'center'})},600);
}

function calcP3(){
    const ex=EX[S.idx]; lockPhase(3);
    const bridge=document.getElementById('br3');bridge.classList.remove('hidden');
    if(ex.type==='sample_size'){
         bridge.innerHTML=`<div class="bridge-div"></div><div class="bridge-res br-pur">Usaremos σ=${fmtN(ex.sigma)} y e=${fmtN(ex.e)} en la fórmula de n</div><div class="bridge-div"></div>`;
    } else {
         bridge.innerHTML=`<div class="bridge-div"></div><div class="bridge-res br-pur">Error Estándar (SE) = ${fmtN(ex.se)}</div><div class="bridge-div"></div>`;
    }
    burst(bridge.querySelector('.bridge-res'));
    setTimeout(()=>{S.phase=4;document.getElementById('ph4').classList.remove('hidden');loadChipsForPhase(4,ex);document.getElementById('ph4').scrollIntoView({behavior:'smooth',block:'center'})},600);
}

function calcP4(){
    const ex=EX[S.idx]; lockPhase(4);
    
    const bridge=document.getElementById('br4');bridge.classList.remove('hidden');
    if(ex.type==='interval'){
        bridge.innerHTML=`<div class="bridge-div"></div><div class="bridge-res br-ok">Intervalo de Confianza: [ ${fmtN(ex.lower)} , ${fmtN(ex.upper)} ]</div><div class="bridge-div"></div>`;
    } else {
        bridge.innerHTML=`<div class="bridge-div"></div><div class="bridge-res br-ok">Tamaño muestral mínimo necesario: n = ${ex.nmin}</div><div class="bridge-div"></div>`;
    }
    burst(bridge.querySelector('.bridge-res'));

    setTimeout(()=>{
        let pts=0;
        ['v_d1','v_n1','v_x1','v_s1','v_e1','v_c2','v_a2','v_z2','v_num3','v_sq3','v_se3','v_e4','v_li4','v_ls4','v_n4'].forEach(t=>{
            if(S.placed[t]){ let b=100; if(S.hints[t])b=25; else if(S.errs[t]>0)b=50; pts+=b; }
        });
        if(S.perfect)pts+=200; S.score+=pts;
        if(S.perfect){S.streak++;if(S.streak>S.maxStreak)S.maxStreak=S.streak}else S.streak=0;
        S.results.push({score:pts,max:1600,perfect:S.perfect,hints:S.hintCt});
        document.getElementById('scN').textContent=S.score;document.getElementById('strN').textContent=S.streak;updProg();
        if(S.perfect){bigBurst();toast(`Perfecto! +${pts} pts (+200 bonus)`,'s')}else toast(`+${pts} pts`,'s');
        const last=S.idx>=EX.length-1;
        document.getElementById('nxtA').innerHTML=`<div class="mt-5 flex justify-end"><button class="btn-p" onclick="${last?'showResults()':'nextEx()'}">${last?'<i class="fas fa-trophy mr-2"></i>Ver resultados':'Siguiente<i class="fas fa-arrow-right ml-2"></i>'}</button></div>`;
    }, 800);
}

function nextEx(){const c=document.getElementById('gCont');c.style.opacity='0';c.style.transform='translateY(-15px)';c.style.transition='opacity .25s,transform .25s';setTimeout(()=>{loadEx(S.idx+1);c.style.opacity='1';c.style.transform='translateY(0)'},260)}

function showResults(){
    showScr('scrR');const mx=EX.length*1600,te=S.results.reduce((s,r)=>s+r.score,0),pct=mx>0?(te/mx*100):0;const pf=S.results.filter(r=>r.perfect).length;
    let rank,rc;if(pct>=90){rank='Maestro de la Inferencia';rc='rg'}else if(pct>=70){rank='Estadístico Experto';rc='rs'}else if(pct>=50){rank='Analista Iniciado';rc='rb'}else{rank='Novato';rc='rk'}
    document.getElementById('rCont').innerHTML=`
    <div class="mb-1 text-xs font-mono tracking-widest uppercase" style="color:var(--muted)">RESULTADOS FINALES</div>
    <div class="score-big mb-1">${te}</div><div class="text-sm mb-3" style="color:var(--muted)">de ${mx} puntos posibles</div>
    <div class="mb-6"><span class="rank-badge ${rc}">${rank}</span></div>
    <div class="grid grid-cols-3 gap-3 mb-8">
        <div class="text-center p-3 rounded-xl" style="background:var(--card);border:1px solid var(--border)"><div class="text-2xl font-bold font-mono" style="color:var(--success)">${pf}/${EX.length}</div><div class="text-xs mt-1" style="color:var(--muted)">Perfectos</div></div>
        <div class="text-center p-3 rounded-xl" style="background:var(--card);border:1px solid var(--border)"><div class="text-2xl font-bold font-mono" style="color:var(--accent)">${Math.round(pct)}%</div><div class="text-xs mt-1" style="color:var(--muted)">Precisión</div></div>
        <div class="text-center p-3 rounded-xl" style="background:var(--card);border:1px solid var(--border)"><div class="text-2xl font-bold font-mono" style="color:var(--fg)">${S.maxStreak}</div><div class="text-xs mt-1" style="color:var(--muted)">Mejor racha</div></div>
    </div>
    <div class="text-left mb-8"><div class="text-sm font-semibold mb-3" style="color:var(--muted)">Detalle por ejercicio</div><div class="flex flex-col gap-2">${S.results.map((r,i)=>{const ratio=r.score/r.max,bc=ratio>=.8?'var(--success)':ratio>=.5?'var(--accent)':'var(--error)';const short=EX[i].stmt.replace(/<[^>]*>/g,'').substring(0,50)+'...';return`<div class="rcard"><div class="flex items-center justify-between mb-1.5"><div class="flex items-center gap-2"><span class="text-xs font-mono" style="color:var(--muted)">${i+1}.</span><span class="text-xs" style="color:var(--fg)">${short}</span>${r.perfect?'<i class="fas fa-crown" style="color:var(--accent2);font-size:.7rem"></i>':''}</div><span class="text-sm font-mono font-bold" style="color:${bc}">${r.score}/${r.max}</span></div><div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden"><div class="bar-f" style="width:${ratio*100}%;background:${bc}"></div></div></div>`}).join('')}</div></div>
    <div class="flex gap-3 justify-center flex-wrap"><button class="btn-p" onclick="startGame()"><i class="fas fa-redo mr-2"></i>Jugar de nuevo</button><button class="btn-sm" onclick="showScr('scrW')" style="background:var(--card);color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:.65rem 1.8rem;cursor:pointer"><i class="fas fa-home mr-2"></i>Inicio</button></div>`;
    if(pct>=70)bigBurst();
}

function startGame(){S={idx:0,phase:1,score:0,streak:0,maxStreak:0,results:[],sel:null,placed:{},errs:{},hints:{},hintCt:0,perfect:true,v:{}};showScr('scrG');buildProg();loadEx(0)}
document.addEventListener('click',e=>{if(!e.target.closest('.chip')&&!e.target.closest('.fslot')&&S.sel){document.querySelectorAll(`#ch${S.phase} .chip.sel`).forEach(c=>c.classList.remove('sel'));S.sel=null}});
</script>
</body>
</html>
